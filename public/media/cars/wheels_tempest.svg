<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <!-- Tire Outer Ring -->
    <circle cx="50" cy="50" r="48" fill="#1e1e24" stroke="#111115" stroke-width="4"/>
    <!-- Tire Inner Details -->
    <circle cx="50" cy="50" r="41" fill="none" stroke="#2e2e38" stroke-width="1.5" stroke-dasharray="6,3"/>
    <circle cx="50" cy="50" r="37" fill="#111115"/>

    <!-- Rim Lip -->
    <circle cx="50" cy="50" r="36" fill="none" stroke="#6b7280" stroke-width="2"/>
    <circle cx="50" cy="50" r="34" fill="#374151"/>

    <!-- Tempest Aero Blades (5 Spokes) -->
    <g stroke="#9ca3af" stroke-width="1" fill="#4b5563">
        <!-- Spoke 1 -->
        <path d="M 50 16 L 45 42 L 50 48 L 55 42 Z"/>
        <!-- Spoke 2 -->
        <path d="M 82.3 39.5 L 57.6 44.5 L 51.8 51.8 L 60.5 56.5 Z"/>
        <!-- Spoke 3 -->
        <path d="M 70 77.6 L 52.4 56.2 L 48.2 55.2 L 47.6 66 Z"/>
        <!-- Spoke 4 -->
        <path d="M 30 77.6 L 47.6 56.2 L 48.2 48.2 L 39.5 56.5 Z"/>
        <!-- Spoke 5 -->
        <path d="M 17.7 39.5 L 42.4 44.5 L 48.2 51.8 L 39.5 44.5 Z"/>
    </g>

    <!-- Center Cap & Lug Nuts -->
    <circle cx="50" cy="50" r="10" fill="#1f2937" stroke="#9ca3af" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="4" fill="#111115"/>
</svg>
