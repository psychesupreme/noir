<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <!-- Tire Outer Ring -->
    <circle cx="50" cy="50" r="48" fill="#15151a" stroke="#09090b" stroke-width="4"/>
    <!-- Tire Inner Details -->
    <circle cx="50" cy="50" r="42" fill="none" stroke="#23232a" stroke-width="1.5" stroke-dasharray="8,4"/>
    <circle cx="50" cy="50" r="39" fill="#09090b"/>

    <!-- Rim Lip -->
    <circle cx="50" cy="50" r="38" fill="none" stroke="#4b5563" stroke-width="1"/>
    <circle cx="50" cy="50" r="37" fill="#1e293b"/>

    <!-- Arachnid Multi-Spoke Pattern (10 Thin Spokes / Mesh) -->
    <g stroke="#d1d5db" stroke-width="0.8" fill="#0f172a" opacity="0.95">
        <!-- Thin double-spokes radiating from center -->
        <!-- Spoke Pair 1 -->
        <path d="M 50 14 L 48 44 L 52 44 Z"/>
        <path d="M 50 14 L 52 44 L 50 48 Z"/>
        <!-- Spoke Pair 2 -->
        <path d="M 71.2 20.8 L 51.8 44.5 L 53.6 47 Z"/>
        <!-- Spoke Pair 3 -->
        <path d="M 84.3 39 L 53.5 47 L 54.8 50 Z"/>
        <!-- Spoke Pair 4 -->
        <path d="M 84.3 61 L 53.5 53 L 54.8 50 Z"/>
        <!-- Spoke Pair 5 -->
        <path d="M 71.2 79.2 L 51.8 55.5 L 53.6 53 Z"/>
        <!-- Spoke Pair 6 -->
        <path d="M 50 86 L 48 56 L 52 56 Z"/>
        <!-- Spoke Pair 7 -->
        <path d="M 28.8 79.2 L 48.2 55.5 L 46.4 53 Z"/>
        <!-- Spoke Pair 8 -->
        <path d="M 15.7 61 L 46.5 53 L 45.2 50 Z"/>
        <!-- Spoke Pair 9 -->
        <path d="M 15.7 39 L 46.5 47 L 45.2 50 Z"/>
        <!-- Spoke Pair 10 -->
        <path d="M 28.8 20.8 L 48.2 44.5 L 46.4 47 Z"/>
    </g>

    <!-- Center Ring & Dark Accent Ring -->
    <circle cx="50" cy="50" r="9" fill="#111827" stroke="#4b5563" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="3.5" fill="#09090b"/>
</svg>
