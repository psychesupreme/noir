<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" width="100%" height="100%">
    <!-- Cockpit Background (Dark Theme) -->
    <rect width="160" height="100" rx="8" fill="#111115"/>
    <path d="M 0 35 H 160 C 160 35, 120 40, 80 40 C 40 40, 0 35, 0 35 Z" fill="#1e1e24"/>
    
    <!-- Central Display (Minimalist Landscape Screen) -->
    <rect x="65" y="42" width="30" height="18" rx="2" fill="#09090b" stroke="#374151" stroke-width="1"/>
    <!-- Screen Content Preview -->
    <path d="M 68 45 H 85 M 68 50 H 92 M 68 55 H 78" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Left Seat (Ebony Leather Side Profile/Front View) -->
    <g fill="#1f2937" stroke="#374151" stroke-width="0.8">
        <!-- Headrest -->
        <rect x="22" y="42" width="16" height="12" rx="4"/>
        <!-- Seat Back -->
        <path d="M 16 57 C 16 57, 20 90, 20 98 H 40 C 40 90, 44 57, 44 57 Z"/>
        <!-- Stitching Detail -->
        <path d="M 30 57 V 98" stroke="#4b5563" stroke-width="0.6" stroke-dasharray="2,2" fill="none"/>
    </g>

    <!-- Right Seat (Ebony Leather Side Profile/Front View) -->
    <g fill="#1f2937" stroke="#374151" stroke-width="0.8">
        <!-- Headrest -->
        <rect x="122" y="42" width="16" height="12" rx="4"/>
        <!-- Seat Back -->
        <path d="M 116 57 C 116 57, 120 90, 120 98 H 140 C 140 90, 144 57, 144 57 Z"/>
        <!-- Stitching Detail -->
        <path d="M 130 57 V 98" stroke="#4b5563" stroke-width="0.6" stroke-dasharray="2,2" fill="none"/>
    </g>

    <!-- Steering Wheel (Yoke or Round outline) -->
    <circle cx="30" cy="55" r="12" fill="none" stroke="#09090b" stroke-width="2.5"/>
    <line x1="20" y1="55" x2="40" y2="55" stroke="#09090b" stroke-width="2"/>
    <circle cx="30" cy="55" r="3" fill="#1f2937"/>
</svg>
