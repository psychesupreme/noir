<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100" height="100" rx="20" fill="#0E0C0C" stroke="#78350F" stroke-width="0.5" stroke-opacity="0.2" />
  <g transform="translate(50, 50)">
    <!-- Hazelnut Box -->
    <rect x="-20" y="-14" width="40" height="28" rx="3" fill="#291305" stroke="#F59E0B" stroke-width="1.2" />
    <!-- Gold leaf emblem -->
    <polygon points="0,-8 4,-4 0,0 -4,-4" fill="#F59E0B" />
    <text x="0" y="5" font-family="sans-serif" font-size="2.5" fill="#FFFFFF" text-anchor="middle" font-weight="bold">DARK HAZELNUT</text>
    <text x="0" y="10" font-family="sans-serif" font-size="1.8" fill="#F59E0B" text-anchor="middle" letter-spacing="0.5">PRALINES</text>
  </g>
</svg>
