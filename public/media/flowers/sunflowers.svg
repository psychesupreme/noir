<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100" height="100" rx="20" fill="#0D0C07" stroke="#F59E0B" stroke-width="0.5" stroke-opacity="0.2" />
  <g transform="translate(50, 48)">
    <path d="M 0,0 C 2,18 -2,32 0,45" fill="none" stroke="#1B4332" stroke-width="3" stroke-linecap="round" />
    <path d="M 0,0 C 5,12 12,10 10,15 C 8,20 2,15 0,0" fill="#2D6A4F" />
    <!-- Yellow Petals (Rotating) -->
    <g>
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#F59E0B" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#FBBF24" transform="rotate(30)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#FBBF24" transform="rotate(60)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#F59E0B" transform="rotate(90)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#FBBF24" transform="rotate(120)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#FBBF24" transform="rotate(150)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#F59E0B" transform="rotate(180)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#FBBF24" transform="rotate(210)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#FBBF24" transform="rotate(240)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#F59E0B" transform="rotate(270)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#FBBF24" transform="rotate(300)" />
      <path d="M 0,0 C -5,-20 5,-20 0,0" fill="#FBBF24" transform="rotate(330)" />
    </g>
    <!-- Center Disk -->
    <circle cx="0" cy="0" r="9" fill="#451A03" stroke="#78350F" stroke-width="1.5" />
    <circle cx="0" cy="0" r="5" fill="#170A02" />
  </g>
