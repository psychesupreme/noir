<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100" height="100" rx="20" fill="#0C0C0E" stroke="#111115" stroke-width="0.5" stroke-opacity="0.3" />
  <g transform="translate(50, 50)">
    <!-- Obsidian bead bracelet ring -->
    <ellipse cx="0" cy="0" rx="20" ry="10" fill="none" stroke="#111115" stroke-width="4" />
