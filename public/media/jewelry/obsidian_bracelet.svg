    <!-- Beads -->
    <circle cx="-20" cy="0" r="3" fill="#1A1A22" />
    <circle cx="-16" cy="6" r="3" fill="#111115" />
    <circle cx="-8" cy="9" r="3" fill="#1A1A22" />
    <circle cx="0" cy="10" r="3.5" fill="#111115" stroke="#D4AF37" stroke-width="0.5" />
    <circle cx="8" cy="9" r="3" fill="#1A1A22" />
    <circle cx="16" cy="6" r="3" fill="#111115" />
    <circle cx="20" cy="0" r="3" fill="#1A1A22" />
    <text x="0" y="-12" font-family="sans-serif" font-size="2.2" fill="#C5A880" text-anchor="middle" font-weight="light" letter-spacing="1">OBSIDIAN BAND</text>
