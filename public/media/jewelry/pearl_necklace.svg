<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100" height="100" rx="20" fill="#0C0D0E" stroke="#C5A880" stroke-width="0.5" stroke-opacity="0.2" />
  <g transform="translate(50, 50)">
    <!-- Gold chain loop -->
    <ellipse cx="0" cy="-2" rx="18" ry="12" fill="none" stroke="#D4AF37" stroke-width="1" />
    <ellipse cx="0" cy="-2" rx="18" ry="12" fill="none" stroke="#FAF9F6" stroke-width="0.5" stroke-dasharray="2,2" />
    <!-- Pearls on chain -->
    <circle cx="0" cy="10" r="4" fill="#FAF9F6" stroke="#D4AF37" stroke-width="0.5" />
    <circle cx="0" cy="10" r="1.5" fill="#FFFFFF" opacity="0.7" />
    <!-- Small side pearls -->
    <circle cx="-6" cy="9" r="2.5" fill="#FAF9F6" />
    <circle cx="6" cy="9" r="2.5" fill="#FAF9F6" />
    <text x="0" y="-12" font-family="sans-serif" font-size="2.5" fill="#C5A880" text-anchor="middle" font-weight="light" letter-spacing="1">AURA PEARL</text>
  </g>
</svg>
