<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0B0D"/>
      <stop offset="100%" style="stop-color:#1A1A1E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#C5A880"/>
      <stop offset="100%" style="stop-color:#B59A7A"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Stylized N&B monogram -->
  <text x="32" y="38" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="1">
    NB
  </text>
  <!-- Small bloom accent dot -->
  <circle cx="32" cy="48" r="2" fill="url(#gold)" opacity="0.7"/>
  <!-- Top accent line -->
  <line x1="18" y1="16" x2="46" y2="16" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
</svg>
