app = "noir-bloom-erp"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # release_command = "php /var/www/html/artisan migrate --force"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_URL = "https://noir-bloom-erp.fly.dev"
  RUN_MIGRATIONS = "false"
  LOG_CHANNEL = "stderr"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/var/www/html/storage/database/database.sqlite"
  DB_SSLMODE = "require"
  SESSION_DRIVER = "database"
  SESSION_SECURE_COOKIE = "true"
  CACHE_STORE = "file"
  QUEUE_CONNECTION = "sync"
  FILESYSTEM_DISK = "local"
  HOME = "/var/www/html"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "get"
  path = "/api/v1/status"
  protocol = "http"
  timeout = "10s"
  tls_skip_verify = false

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "noir_storage"
  destination = "/var/www/html/storage"
